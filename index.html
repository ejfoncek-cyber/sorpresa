<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>7 de mayo</title>
<style>
body {
    background-color: #000000;
    margin: 0;
    font-family: Arial, sans-serif;
    color: #ffffff;
    text-align: center;
}
.container {
    width: 100%;
    margin: 0 auto;
    padding-top: 25vh;
}
.heart {
    width: 80px;
    height: 80px;
    background-color: #cc0000;
    position: relative;
    transform: rotate(-45deg);
    animation: heartbeat 1.5s infinite;
    margin: 0 auto 50px auto;
}
.heart::before,
.heart::after {
    content: "";
    width: 80px;
    height: 80px;
    background-color: #cc0000;
    border-radius: 50%;
    position: absolute;
}
.heart::before {
    top: -40px;
    left: 0;
}
.heart::after {
    top: 0;
    left: 40px;
}
@keyframes heartbeat {
    0% { transform: scale(1) rotate(-45deg); }
    50% { transform: scale(1.15) rotate(-45deg); }
    100% { transform: scale(1) rotate(-45deg); }
}
.message {
    font-size: 1.3rem;
    line-height: 1.8;
    width: 80%;
    margin: 0 auto;
    letter-spacing: 1px;
}
.highlight {
    color: #cc0000;
    font-weight: bold;
}
</style>
</head>
<body>
<div class="container">
    <div class="heart"></div>
    <div class="message">
        Aunque este <span class="highlight">7 de mayo</span> represente lo que hubiera sido nuestro primer año continuo,<br><br>
        hoy me quedo con que tenemos una nueva oportunidad.<br><br>
        Vamos despacio, haciendo las cosas bien y construyendo algo mucho mejor.
    </div>
</div>
</body>
</html>
